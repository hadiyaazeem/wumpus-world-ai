<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wumpus World - AI Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #eee;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
            background: linear-gradient(135deg, #00b4db, #0083b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .grid-config {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .grid-config label {
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: 1.1rem;
        }

        .grid-config input {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            width: 80px;
        }

        .action-controls {
            text-align: center;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 5px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #initBtn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        #stepBtn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        #autoBtn {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
        }

        #resetBtn {
            background: linear-gradient(135deg, #fa709a, #fee140);
            color: #333;
        }

        .dashboard {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .metric-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            flex: 1;
            min-width: 150px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .metric-card h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #aaa;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00b4db;
        }

        .percept-badge {
            display: inline-block;
            padding: 5px 15px;
            margin: 5px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .percept-badge.true {
            background: #ff6b6b;
            color: white;
        }

        .percept-badge.false {
            background: #4ecdc4;
            color: white;
        }

        .grid-container {
            display: flex;
            justify-content: center;
            overflow-x: auto;
            margin-top: 20px;
        }

        .grid {
            display: inline-grid;
            gap: 3px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
        }

        .cell {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            position: relative;
            transition: all 0.2s ease;
            border: 2px solid rgba(255,255,255,0.2);
            background: linear-gradient(135deg, #2c3e50, #34495e);
        }

        .cell.safe {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }

        .cell.unsafe {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
        }

        .cell.agent {
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
            border-color: gold;
        }

        .cell-icon {
            font-size: 1.8rem;
        }

        .cell-percepts {
            font-size: 0.7rem;
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        .percept-icon {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 2px 5px;
        }

        .status-message {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }

        .status-message.success {
            background: #27ae60;
        }

        .status-message.error {
            background: #e74c3c;
        }

        .status-message.warning {
            background: #f39c12;
        }

        .legend {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            font-size: 0.9rem;
            color: #aaa;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .cell {
                width: 50px;
                height: 50px;
                font-size: 1rem;
            }
            .cell-icon {
                font-size: 1.2rem;
            }
            .cell-percepts {
                font-size: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐉 Wumpus World - AI Agent</h1>
        
        <div class="controls">
            <div class="grid-config">
                <label>Rows: <input type="number" id="rows" value="5" min="3" max="8"></label>
                <label>Cols: <input type="number" id="cols" value="5" min="3" max="8"></label>
            </div>
            <div class="action-controls">
                <button id="initBtn">🎮 New Game</button>
                <button id="stepBtn" disabled>👣 Step</button>
                <button id="autoBtn" disabled>⚡ Auto Explore</button>
                <button id="resetBtn" disabled>🔄 Reset</button>
            </div>
        </div>
        
        <div class="dashboard">
            <div class="metric-card">
                <h3>🧠 Inference Steps</h3>
                <div class="metric-value" id="inferenceSteps">0</div>
            </div>
            <div class="metric-card">
                <h3>📍 Visited Cells</h3>
                <div class="metric-value" id="visitedCount">0</div>
            </div>
            <div class="metric-card">
                <h3>🔒 Safe Cells</h3>
                <div class="metric-value" id="safeCount">0</div>
            </div>
            <div class="metric-card">
                <h3>💰 Gold</h3>
                <div class="metric-value" id="goldStatus">❌</div>
            </div>
        </div>
        
        <div class="dashboard">
            <div class="metric-card">
                <h3>Percepts</h3>
                <div>
                    <span id="breezeBadge" class="percept-badge false">🌊 Breeze: ❌</span>
                    <span id="stenchBadge" class="percept-badge false">💨 Stench: ❌</span>
                </div>
            </div>
        </div>
        
        <div class="grid-container">
            <div class="grid" id="grid"></div>
        </div>
        
        <div id="statusMessage" class="status-message"></div>
        <div class="legend">
            🤖 Agent | ✅ Safe | ❌ Unsafe (Pit/Wumpus) | 🐉 Wumpus | 
            🕳️ Pit | 💰 Gold | 🌊 Breeze | 💨 Stench
        </div>
    </div>

    <script>
        let autoInterval = null;
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('statusMessage');
            msgDiv.textContent = text;
            msgDiv.className = `status-message ${type}`;
            setTimeout(() => {
                if (msgDiv.textContent === text) {
                    msgDiv.style.opacity = '0';
                    setTimeout(() => {
                        msgDiv.textContent = '';
                        msgDiv.className = 'status-message';
                        msgDiv.style.opacity = '1';
                    }, 500);
                }
            }, 3000);
        }
        
        function updateDashboard(data) {
            document.getElementById('inferenceSteps').textContent = data.inference_steps || 0;
            document.getElementById('visitedCount').textContent = data.visited_count || 0;
            document.getElementById('safeCount').textContent = data.safe_count || 0;
            document.getElementById('goldStatus').textContent = data.has_gold ? '✅' : '❌';
            
            const breeze = data.percepts ? data.percepts.breeze : false;
            const stench = data.percepts ? data.percepts.stench : false;
            
            const breezeBadge = document.getElementById('breezeBadge');
            const stenchBadge = document.getElementById('stenchBadge');
            
            breezeBadge.textContent = `🌊 Breeze: ${breeze ? '✅' : '❌'}`;
            breezeBadge.className = `percept-badge ${breeze ? 'true' : 'false'}`;
            
            stenchBadge.textContent = `💨 Stench: ${stench ? '✅' : '❌'}`;
            stenchBadge.className = `percept-badge ${stench ? 'true' : 'false'}`;
        }
        
        function renderGrid(gridData) {
            const gridContainer = document.getElementById('grid');
            if (!gridData || !gridData.length) {
                gridContainer.innerHTML = '<div style="padding: 20px;">Loading...</div>';
                return;
            }
            
            const rows = gridData.length;
            const cols = gridData[0].length;
            
            gridContainer.style.gridTemplateColumns = `repeat(${cols}, 70px)`;
            
            let html = '';
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = gridData[r][c];
                    let cellClass = 'cell ';
                    let icon = '';
                    
                    if (cell.safe && !cell.unsafe) {
                        cellClass += 'safe';
                        if (cell.visited) icon = '✅';
                        else icon = '?';
                    } else if (cell.unsafe) {
                        cellClass += 'unsafe';
                        if (cell.has_pit) icon = '🕳️';
                        else if (cell.has_wumpus) icon = '🐉';
                        else icon = '⚠️';
                    } else {
                        cellClass += 'unknown';
                        icon = '?';
                    }
                    
                    if (cell.has_agent) {
                        cellClass += ' agent';
                        icon = '🤖';
                    } else if (cell.visited && !cell.has_agent) {
                        if (cell.has_wumpus) icon = '🐉';
                        else if (cell.has_pit) icon = '🕳️';
                        else if (cell.has_gold && !cell.has_gold_taken) icon = '💰';
                        else if (cell.safe) icon = '✅';
                    }
                    
                    let perceptHtml = '';
                    if (cell.has_agent && (cell.breeze || cell.stench)) {
                        perceptHtml = '<div class="cell-percepts">';
                        if (cell.breeze) perceptHtml += '<span class="percept-icon">🌊</span>';
                        if (cell.stench) perceptHtml += '<span class="percept-icon">💨</span>';
                        perceptHtml += '</div>';
                    }
                    
                    html += `<div class="${cellClass}" title="(${r},${c})">
                        <div class="cell-icon">${icon}</div>
                        ${perceptHtml}
                    </div>`;
                }
            }
            
            gridContainer.innerHTML = html;
        }
        
        async function initGame() {
            stopAuto();
            const rows = parseInt(document.getElementById('rows').value);
            const cols = parseInt(document.getElementById('cols').value);
            
            showMessage('Initializing game...', 'success');
            
            try {
                const response = await fetch('/init', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({rows: rows, cols: cols})
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.status === 'error') {
                    throw new Error(data.message);
                }
                
                if (data.status === 'initialized') {
                    renderGrid(data.grid);
                    updateDashboard({
                        inference_steps: data.inference_steps || 0,
                        visited_count: data.visited_count || 1,
                        safe_count: data.safe_count || 1,
                        percepts: data.percepts || {breeze: false, stench: false},
                        has_gold: false
                    });
                    
                    document.getElementById('stepBtn').disabled = false;
                    document.getElementById('autoBtn').disabled = false;
                    document.getElementById('resetBtn').disabled = false;
                    
                    showMessage('Game initialized! Click Step to start exploring.', 'success');
                }
            } catch (error) {
                console.error('Init error:', error);
                showMessage('Failed to initialize game: ' + error.message, 'error');
            }
        }
        
        async function stepGame() {
            try {
                const response = await fetch('/step', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({})
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.status === 'error') {
                    showMessage(data.message || 'Game error', 'error');
                    return;
                }
                
                renderGrid(data.grid);
                
                updateDashboard({
                    inference_steps: data.inference_steps || 0,
                    visited_count: data.visited_count || 0,
                    safe_count: data.safe_count || 0,
                    percepts: data.percepts || {breeze: false, stench: false},
                    has_gold: data.has_gold || false
                });
                
                if (data.status === 'game_over') {
                    showMessage(`💀 Game Over! Killed by ${data.reason === 'wumpus' ? 'Wumpus' : 'Pit'}!`, 'error');
                    document.getElementById('stepBtn').disabled = true;
                    document.getElementById('autoBtn').disabled = true;
                    stopAuto();
                } else if (data.status === 'complete') {
                    showMessage('🎉 Victory! All safe cells explored! 🎉', 'success');
                    document.getElementById('stepBtn').disabled = true;
                    document.getElementById('autoBtn').disabled = true;
                    stopAuto();
                } else if (data.status === 'gold') {
                    showMessage('💰 You found the gold!', 'success');
                } else if (data.status === 'stuck') {
                    showMessage('⚠️ Agent stuck! No safe unvisited cells.', 'warning');
                    document.getElementById('stepBtn').disabled = true;
                    document.getElementById('autoBtn').disabled = true;
                    stopAuto();
                }
                
                return data;
            } catch (error) {
                console.error('Step error:', error);
                showMessage('Error: ' + error.message, 'error');
                return null;
            }
        }
        
        function startAutoExplore() {
            if (autoInterval) {
                stopAuto();
                document.getElementById('autoBtn').textContent = '⚡ Auto Explore';
                return;
            }
            
            document.getElementById('autoBtn').textContent = '⏸️ Stop';
            
            async function autoStep() {
                const result = await stepGame();
                if (result && (result.status === 'game_over' || result.status === 'complete' || result.status === 'stuck')) {
                    stopAuto();
                }
            }
            
            autoInterval = setInterval(autoStep, 500);
        }
        
        function stopAuto() {
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
            }
            document.getElementById('autoBtn').textContent = '⚡ Auto Explore';
        }
        
        function resetGame() {
            stopAuto();
            initGame();
        }
        
        // Event Listeners
        document.getElementById('initBtn').addEventListener('click', initGame);
        document.getElementById('stepBtn').addEventListener('click', stepGame);
        document.getElementById('autoBtn').addEventListener('click', startAutoExplore);
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        
        // Auto-initialize on page load
        window.addEventListener('load', () => {
            setTimeout(initGame, 500);
        });
    </script>
</body>
</html>
